<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AAi</title>
<link rel="icon" type="image/gif" href="/ayaka.gif">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<!-- ✅ HIGHLIGHT.JS — syntax highlighting untuk code box -->
 <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Share+Tech+Mono&family=Orbitron&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root {
  --blue-light:  #c8eaf5;
  --blue-mid:    #5ab4d4;
  --blue-dark:   #2a7a9e;
  --off-white:   #f8fbff;
  --text:        #1e2a44;
  --text-muted:  #7a8aa8;
  --radius:      24px;
  --shadow-sm:   0 4px 12px rgba(138,234,245,.15);
  --shadow-md:   0 10px 30px rgba(138,234,245,.22);
}
.code-window pre.hljs-pre::-webkit-scrollbar { height: 6px; }
.code-window pre.hljs-pre::-webkit-scrollbar-track { background: #161b22; }
.code-window pre.hljs-pre::-webkit-scrollbar-thumb { background: #484f58; border-radius: 3px; }
.code-window pre.hljs-pre::-webkit-scrollbar-thumb:hover { background: #58a6ff; }
.code-window pre.hljs-pre {
  margin: 0;
  padding: 0 0 16px 0;
  background: transparent !important;
  font-family: 'Space Mono', 'IBM Plex Mono', ui-monospace, monospace;
  font-size: 14.6px;
  line-height: 1.65;
  font-weight: 370;
  letter-spacing: 0.32px;
  tab-size: 4;
  overflow-x: auto;
  white-space: pre;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { max-width: 100%; overflow-x: hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--off-white);
  color: var(--text);
  height: 100dvh;
  display: flex;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(ellipse 80% 60% at 15% 25%, rgba(138,234,245,.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 85% 75%, rgba(210,179,230,.14) 0%, transparent 70%);
  pointer-events: none;
}

/* ── EDIT PESAN USER ── */
.edit-textarea {
  width: 100%; min-height: 90px; max-height: 300px;
  border: 1.5px solid var(--blue-mid); border-radius: 16px;
  padding: 14px 18px; font-size: 15px; font-family: inherit;
  resize: vertical; outline: none; background: #fff;
  color: var(--text); line-height: 1.6;
  box-shadow: var(--shadow-sm);
}
.edit-actions {
  display: flex; gap: 10px; margin-top: 10px; justify-content: flex-end;
}
.btn-edit-cancel {
  background: #f1f5f9; border: none; padding: 8px 18px;
  border-radius: 12px; cursor: pointer; font-size: 13px; color: var(--text);
  transition: .2s;
}
.btn-edit-cancel:hover { background: #e2e8f0; }
.btn-edit-save {
  background: linear-gradient(135deg, var(--blue-mid), #b38fd4);
  border: none; padding: 8px 18px; border-radius: 12px;
  cursor: pointer; font-size: 13px; color: white; font-weight: 600;
  transition: .2s;
}
.btn-edit-save:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(90,180,212,.3); }

/* ── SIDEBAR ── */
.sidebar {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  width: 280px;
  background: var(--off-white);
  border-right: 1px solid rgba(138,234,245,.25);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
  flex-shrink: 0;
}

#sessionList {
  flex-grow: 1;
  overflow-y: auto;
  padding: 12px 8px;
}

.logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
.logo-icon {
  width: 100px; height: 100px; border-radius: 16px;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
}
.logo-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px; font-weight: 700;
  background: linear-gradient(120deg, #5ab4d4, #d2b3e6);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}

.new-chat-btn {
  width: 100%; padding: 14px 20px; margin-top: 20px;
  background: linear-gradient(135deg, var(--blue-mid), #b38fd4);
  color: white; border: none; border-radius: 20px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: var(--shadow-md);
  transition: all .3s ease;
}
.new-chat-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(90,180,212,.4); }

.session-item {
  padding: 8px 14px; margin: 2px 8px; border-radius: 14px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: all .3s ease;
}
.session-item:hover { background: rgba(138,234,245,.15); }
.session-item.active { background: rgba(138,234,245,.25); font-weight: 500; }
.session-actions { display: flex; gap: 8px; opacity: 0; transition: .2s; }
.session-item:hover .session-actions { opacity: 1; }
.action-btn { background: none; border: none; font-size: 16px; cursor: pointer; transition: transform .2s; }
.action-btn:hover { transform: scale(1.2); }

.user-card {
  flex-shrink: 0;
  padding: 16px 20px;
  border-top: 1px solid rgba(138,234,245,.25);
  display: flex; align-items: center; justify-content: space-between;
  background: #ffffff;
}
.user-info { display: flex; align-items: center; gap: 10px; }
.user-avatar-mini {
  width: 36px; height: 36px; border-radius: 50%;
  background: #c8eaf5;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.logout-btn { background: none; border: none; font-size: 20px; cursor: pointer; transition: transform .2s; color: #e74c3c; }
.logout-btn:hover { transform: scale(1.15); }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; width: 100%; }

.topbar {
  padding: 18px 28px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(138,234,245,.25);
  display: flex; align-items: center; gap: 16px;
  z-index: 20;
}
.hamburger { display: none; font-size: 32px; cursor: pointer; color: var(--blue-dark); }

/* ── CHAT AREA ── */
.chat-area {
  flex: 1; padding: 32px 32px 24px;
  display: flex; flex-direction: column; gap: 16px;
  overflow-y: auto; overflow-x: hidden;
  scroll-behavior: smooth;
}

/* ── MESSAGES ── */
.msg-row.assistant {
  display: flex; flex-direction: column;
  align-items: flex-start; gap: 8px;
  max-width: 100%;
}
.assistant .avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: transparent;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.assistant .avatar img { width: 100%; height: 100%; object-fit: contain; }

.assistant .bubble {
  background: transparent; color: var(--text);
  padding: 4px 0; border: none; box-shadow: none;
  font-size: 15px; line-height: 1.6;
  width: 100%; overflow-wrap: anywhere; word-break: break-word;
  text-align: justify;
}

.msg-row.user {
  display: flex; justify-content: flex-end;
  max-width: 85%; margin-left: auto;
}
.user .bubble {
  background: var(--blue-light); color: var(--text);
  padding: 14px 20px;
  border-radius: 24px; border-bottom-right-radius: 8px;
  box-shadow: 0 6px 16px rgba(138,234,245,.2);
  font-size: 15px; line-height: 1.5;
}

/* ── BUBBLE MARKDOWN ── */
.bubble h1, .bubble h2, .bubble h3 {
  margin: 12px 0 8px; font-size: 1.1em; color: var(--blue-dark);
}
.bubble p { margin-bottom: 6px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble ul, .bubble ol { margin-left: 20px; margin-bottom: 6px; }
.bubble li { margin-bottom: 4px; }
.bubble li p { margin-bottom: 0; display: inline; }
.bubble code {
  font-family: ui-monospace, monospace;
  background: rgba(42,122,158,.12);
  padding: 2px 6px; border-radius: 6px;
  font-size: 13.5px; color: var(--blue-dark);
}
.bubble pre {
  background: #1e2a44; color: #c8eaf5;
  padding: 12px; border-radius: 8px;
  overflow-x: auto; margin: 8px 0;
  font-family: ui-monospace, monospace;
  font-size: 13px; line-height: 1.4; max-width: 100%;
}
.bubble pre code { background: transparent; padding: 0; color: inherit; }
.bubble table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 14px; }
.bubble th, .bubble td { border: 1px solid var(--blue-light); padding: 8px; text-align: left; }
.bubble ol, .bubble ul { padding-left: 22px; margin: 10px 0; }
.bubble li { margin-bottom: 6px; line-height: 1.65; }
.bubble li::marker { color: var(--blue-dark); font-weight: 700; }
/* ── CODE WINDOW ── */
.code-window {
  position: relative;
  border-radius: 12px;
  overflow: visible; /* hapus spasi berlebih di sini */
  margin: 16px 0 48px; /* top 16px, right/left 0, bottom 32px */
  border: 1px solid #30363d;
  box-shadow: 0 8px 24px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.3);
  background: #0d1117;
  display: flex;
  flex-direction: column;
}
.code-window::before {
  content: ''; 
  position: absolute; 
  top: 0; left: 0; right: 0; 
  height: 3px;
  background: linear-gradient(90deg, #58a6ff, #bc8cff, #5ab4d4);
  z-index: 1;
}
.bubble p + .code-window, 
.bubble .code-window + p { 
  margin-top: 0px; 
}


.code-header {
  position: sticky !important;
  top: 0 !important;
  z-index: 50 !important;
  
  background: transparent !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 18px;             
  
  border-bottom: none !important;
  box-shadow: none !important;
  
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  flex-shrink: 0;
}

/* Saat di-scroll tetap transparan total */
.code-window.scrolled .code-header {
  background: transparent !important;
  box-shadow: none !important;
  border-bottom: none !important;
}

/* Scroll area (scrollbar x tetap nempel di bawah) */
.code-scroll-area {
  overflow-x: auto;
  overflow-y: visible;
  background: #0d1117;
  max-height: none;
  padding: 0 16px 24px 16px;
}
/* ── SCROLLBAR KEREN & TIPIS ── */
.code-scroll-area::-webkit-scrollbar {
  height: 5px;                    /* tipis tapi masih kelihatan elegan */
  background: transparent;
}

.code-scroll-area::-webkit-scrollbar-track {
  background: #161b22;
  border-radius: 9999px;
  margin: 0 8px;                  /* biar tidak terlalu mepet pinggir */
}

.code-scroll-area::-webkit-scrollbar-thumb {
  background: linear-gradient(90deg, #58a6ff, #a78bfa);
  border-radius: 9999px;
  box-shadow: 0 1px 4px rgba(88, 166, 255, 0.5);
}

.code-scroll-area::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(90deg, #79c0ff, #c9b6ff);
  box-shadow: 0 0 8px rgba(121, 192, 255, 0.7);
}

/* Firefox support */
.code-scroll-area {
  scrollbar-width: thin;
  scrollbar-color: #58a6ff #161b22;
}



.code-header-lang {
  font-weight: 500;
  font-family: ui-monospace, monospace;
  color: #79c0ff;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.code-header-lang .lang-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: currentColor; opacity: .7; display: inline-block;
}
.code-header-actions { display: flex; gap: 12px; align-items: center; }

/* ── HIGHLIGHT.JS OVERRIDES untuk background hitam ── */
.code-window pre.hljs-pre {
  margin: 0;
  padding: 16px 0 0 0;
  overflow: visible;
  max-height: none;
  background: #0d1117 !important;
  font-family: 'Roboto Mono', 'IBM Plex Mono', monospace;
  font-size: 14px;
  line-height: 1.2;
  letter-spacing: 0.3px;
  tab-size: 2;
  transition: all .3s ease;
  -webkit-overflow-scrolling: touch;
}
.code-window pre.hljs-pre.minimized { display: none; }
.code-window pre.hljs-pre code.hljs {
  background: transparent;
  padding: 0;
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
}
/* Warna token hljs — disesuaikan dengan latar hitam #0d1117 */
.hljs-keyword, .hljs-selector-tag, .hljs-tag    { color: #ff7b72; font-weight: 400 !important; } /* merah-oranye */
.hljs-built_in, .hljs-builtin-name              { color: #ffa657; }                   /* oranye terang */
.hljs-type, .hljs-class .hljs-title             { color: #ffa657; font-weight: 400 !important;}
.hljs-string, .hljs-attr, .hljs-template-tag    { color: #a5d6ff; }                   /* biru muda */
.hljs-title, .hljs-section, .hljs-title.function__{ color: #d2a8ff; font-weight: 400 !important;}/* ungu */
.hljs-comment, .hljs-quote                      { color: #8b949e; font-style: italic; }
.hljs-number, .hljs-literal, .hljs-variable     { color: #79c0ff; }                   /* biru */
.hljs-params                                    { color: #e6edf3; }
.hljs-addition                                  { color: #aff5b4; background: #033a16; }
.hljs-deletion                                  { color: #ffdcd7; background: #67060c; }
.hljs-meta                                      { color: #f2cc60; }
.hljs-operator, .hljs-punctuation               { color: #ff7b72; }
.hljs-property                                  { color: #79c0ff; }
.hljs-selector-class, .hljs-selector-id         { color: #d2a8ff; }

/* ── EXCEL FORMULA SYNTAX COLORS ── */
.excel-fn       { color: #ffa657; font-weight: 500 !important; }   /* fungsi: SUM, IF, … */
.excel-op       { color: #ff7b72; }                     /* operator: = + - * / */
.excel-str      { color: #a5d6ff; }                     /* string: "teks" */
.excel-num      { color: #79c0ff; }                     /* angka */
.excel-ref      { color: #d2a8ff; }                     /* referensi sel: A1, B2:C5 */
.excel-sheet    { color: #f2cc60; }                     /* nama sheet: Sheet1! */
.excel-bool     { color: #ff7b72; font-weight: 500 !important;}   /* TRUE / FALSE */
.excel-error    { color: #ffa198; font-style: italic; } /* #REF!, #N/A, dll */

.copy-code-btn {
  background: none; border: none; color: #8b949e; cursor: pointer;
  display: flex; align-items: center; gap: 6px; font-size: 12px; transition: .2s;
  padding: 3px 8px; border-radius: 6px;
}
.copy-code-btn:hover { color: #58a6ff; background: rgba(88,166,255,.1); transform: scale(1.05); }

/* ── STREAMING CURSOR ── */
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
.stream-cursor::after {
  content: '▌';
  color: var(--blue-mid);
  animation: blink 0.7s infinite;
  font-size: 14px;
  margin-left: 1px;
}
.streaming-plain {
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
}

/* ── TYPING INDICATOR ── */
.typing-indicator {
  display: flex; align-items: center; gap: 6px; padding: 12px 20px;
  background: #c8eaf5; border-radius: 9999px; width: fit-content;
  box-shadow: var(--shadow-sm);
}
.typing-dot {
  width: 8px; height: 8px; background: #2a7a9e; border-radius: 50%;
  animation: typingPulse 1.4s infinite ease-in-out;
}
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }
@keyframes typingPulse { 0%,100% { transform: scale(.6); opacity: .4; } 50% { transform: scale(1); opacity: 1; } }

/* ── MSG ACTIONS ── */
.msg-actions {
  display: flex; gap: 14px; margin-top: 8px;
  color: var(--text-muted); align-items: center; width: 100%;
}
.msg-actions button {
  background: none; border: none; color: inherit;
  cursor: pointer; font-size: 15px; transition: .2s;
}
.msg-actions button:hover { color: var(--blue-dark); transform: scale(1.15); }
.user-actions {
  display: flex; justify-content: flex-end; align-items: center;
  margin-top: 6px; gap: 6px; 
  color: var(--text-muted); padding-right: 0; 
}
.user-actions button {
  background: none; border: none; color: inherit;
  cursor: pointer; font-size: 14px; opacity: .6; transition: all .2s ease;
  padding: 6px 8px; border-radius: 8px;
}
.user-actions button:hover { opacity: 1; color: var(--blue-dark); background: rgba(138,234,245,.15); transform: scale(1.05); }

/* ── VERSION TAG ── */
.version-tag {
  font-size: 11px; background: var(--blue-light); color: var(--blue-dark);
  padding: 2px 8px; border-radius: 10px; font-weight: 600; margin-left: 10px;
}

/* ── SOURCES ── */
.sources-container {
  margin-top: 15px; padding-top: 12px;
  border-top: 1px dashed var(--blue-light);
  display: flex; flex-direction: column; gap: 8px;
}
.source-label { font-size: 12px; font-weight: 700; color: var(--blue-dark); text-transform: uppercase; letter-spacing: 1px; }
.source-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.source-item {
  background: #fff; border: 1px solid var(--blue-light); padding: 6px 12px;
  border-radius: 12px; font-size: 13px; color: var(--blue-dark);
  text-decoration: none; display: flex; align-items: center; gap: 6px;
  transition: .2s; box-shadow: var(--shadow-sm);
}
.source-item:hover { background: var(--blue-light); transform: translateY(-2px); }
.source-img { width: 100%; max-width: 200px; border-radius: 12px; margin-top: 8px; border: 2px solid var(--blue-light); }
.source-card {
  background: #fff; border: 2px solid #c8eaf5;
  border-radius: 18px; padding: 14px 18px; margin-top: 10px;
  font-size: 14px; box-shadow: var(--shadow-sm);
}

/* ── INPUT AREA ── */
.input-area {
  padding: 12px 20px 20px;
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(138,234,245,.25);
}
.input-wrap {
  display: flex; flex-direction: row;
  align-items: center; gap: 12px;
  background: #ffffff; border: 2px solid var(--blue-light);
  padding: 8px 16px; border-radius: 32px;
  box-shadow: var(--shadow-md);
  transition: background .3s, border-color .3s;
}

/* ── UPLOAD BUTTON & PREVIEW ── */
.upload-container { display: flex; align-items: flex-end; gap: 6px; flex-shrink: 0; padding-bottom: 4px; }
.upload-btn { width: 36px; height: 36px; border-radius: 50%; background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: .2s; font-size: 18px; }
.upload-btn:hover { color: var(--blue-mid); transform: scale(1.1); }
.file-preview-container {
  display: flex; flex-wrap: wrap; gap: 12px;
  padding: 12px 16px 8px; max-width: 100%;
  min-height: 0;
  transition: opacity 0.3s ease, transform 0.3s ease, padding 0.3s ease;
}
.file-preview-container:empty { display: none; padding: 0; }
.file-preview-container.fading-out {
  opacity: 0; transform: translateY(-8px); pointer-events: none;
}
.file-preview-item {
  position: relative; background: #fff;
  border: 2px solid var(--blue-light); border-radius: 16px;
  padding: 8px; box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column; align-items: center;
  width: 140px; height: 140px; overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.file-preview-item:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.file-preview-item img {
  width: 100%; height: 100%; object-fit: cover;
  border-radius: 10px; flex: 1;
}
.file-preview-item .file-icon {
  font-size: 32px; color: var(--blue-mid); margin: auto;
}
.file-preview-item .file-name {
  font-size: 11px; color: var(--text-muted); text-align: center;
  margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;
}
.file-preview-item .remove-file {
  position: absolute; top: 6px; right: 6px;
  width: 24px; height: 24px; background: #e74c3c; color: #fff;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; font-weight: bold;
  box-shadow: 0 2px 6px rgba(0,0,0,.2); transition: .2s;
}
.file-preview-item .remove-file:hover { transform: scale(1.15); background: #c0392b; }

#messageInput {
  flex: 1; min-width: 0;  font-family: 'DM Sans', sans-serif; 
  border: none; background: transparent;
  font-size: 15px; outline: none; resize: none;
  max-height: 120px; line-height: 1.5; padding: 8px 0;
  color: var(--text);
}

.send-btn {
  flex-shrink: 0; width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blue-mid), #b38fd4);
  color: white; display: flex; align-items: center; justify-content: center;
  border: none; cursor: pointer;
  box-shadow: 0 4px 12px rgba(90,180,212,.3);
  transition: transform .2s ease, background .2s ease;
}
.send-btn:hover { transform: scale(1.1); }
.send-btn.stop-mode {
  background: linear-gradient(135deg, #e74c3c, #c0392b);
}

/* ── SETTINGS ── */
.settings-wrapper { position: relative; flex-shrink: 0; }
.settings-btn {
  background: transparent; border: none; color: var(--text-muted);
  font-size: 20px; cursor: pointer; padding: 8px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; transition: .2s;
}
.settings-btn:hover { color: var(--blue-dark); transform: scale(1.1); }
.settings-menu {
  position: absolute; bottom: 120%; left: 0;
  background: #ffffff; border: 2px solid var(--blue-light);
  border-radius: 16px; box-shadow: var(--shadow-md);
  padding: 8px 0; width: 200px;
  display: none; flex-direction: column; z-index: 100;
  transform: translateY(10px); opacity: 0; transition: all .2s ease;
}
.settings-menu.show { display: flex; transform: translateY(0); opacity: 1; }
.settings-header { padding: 6px 16px; font-size: 11px; font-weight: 700; color: var(--blue-dark); text-transform: uppercase; letter-spacing: .5px; }
.settings-item {
  padding: 8px 16px; font-size: 14px; color: var(--text);
  background: none; border: none; text-align: left;
  cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  transition: background .2s;
}
.settings-item:hover { background: var(--off-white); }
.settings-item.active { color: var(--blue-dark); font-weight: 600; }
.settings-item i.check { color: #5ab4d4; opacity: 0; transition: .2s; }
.settings-item.active i.check { opacity: 1; }

/* ── DELETE MODAL ── */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100dvh;
  background: rgba(30,42,68,.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 99999; opacity: 0; pointer-events: none; transition: .3s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-box {
  background: #fff; padding: 24px 32px; border-radius: 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,.2); text-align: center;
  transform: translateY(20px); transition: .3s cubic-bezier(.4,0,.2,1);
  max-width: 320px; width: 90%; border: 2px solid var(--blue-light);
}
.modal-overlay.active .modal-box { transform: translateY(0); }
.modal-title { font-size: 18px; font-weight: 700; color: #e74c3c; margin-bottom: 8px; }
.modal-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
.modal-actions { display: flex; gap: 12px; justify-content: center; }
.btn-cancel, .btn-confirm {
  padding: 10px 20px; border-radius: 99px; border: none;
  font-weight: 600; cursor: pointer; transition: .2s;
}
.btn-cancel { background: #f1f5f9; color: var(--text); }
.btn-cancel:hover { background: #e2e8f0; }
.btn-confirm { background: #e74c3c; color: white; }
.btn-confirm:hover { background: #c0392b; transform: scale(1.05); }

/* ── MOBILE ── */
@media (max-width: 768px) {
  body::before { display: none; }
  .hamburger { display: block; z-index: 50; padding-right: 10px; }
  .sidebar {

function speakText(btn, text) {
  if (isSpeaking) {
    speechSynthesis.cancel();
    isSpeaking = false;
    document.querySelectorAll('.tts-btn i').forEach(i => {
      i.className = 'fas fa-volume-up'; i.style.color = 'inherit';
    });
    return;
  }
  const clean = text
    .replace(/```[\s\S]*?```/g, 'blok kode')
    .replace(/`[^`]+`/g, '')
    .replace(/[#*_~>\[\]]/g, '')
    .replace(/https?:\/\/\S+/g, 'tautan')
    .trim();
  currentUtterance = new SpeechSynthesisUtterance(clean);
  currentUtterance.lang  = 'id-ID';
  currentUtterance.rate  = 0.95;
  currentUtterance.pitch = 1.3;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith('id') && (v.name.includes('Google') || v.name.includes('Gadis') || v.name.toLowerCase().includes('female')))
         || voices.find(v => v.lang.startsWith('id'))
         || voices.find(v => v.lang.startsWith('en'));
  if (v) currentUtterance.voice = v;
  const icon = btn.querySelector('i');
  icon.className = 'fas fa-stop-circle'; icon.style.color = '#e74c3c'; isSpeaking = true;
  currentUtterance.onend = currentUtterance.onerror = () => {
    isSpeaking = false; icon.className = 'fas fa-volume-up'; icon.style.color = 'inherit';
  };
  speechSynthesis.speak(currentUtterance);
}

// ══════════════════════════════════════════
// SYNTAX HIGHLIGHTING — EXCEL FORMULA
// Menghighlight formula Excel dengan warna token berbeda
// ══════════════════════════════════════════
const EXCEL_FUNCTIONS = [
  'ABS','ACOS','ACOSH','ADDRESS','AND','AREAS','ASIN','ASINH','ATAN','ATAN2','ATANH',
  'AVERAGE','AVERAGEA','AVERAGEIF','AVERAGEIFS','BASE','CEILING','CELL','CHAR','CHOOSE',
  'CLEAN','CODE','COLUMN','COLUMNS','COMBIN','COMPLEX','CONCATENATE','CONCAT','COS','COSH',
  'COUNT','COUNTA','COUNTBLANK','COUNTIF','COUNTIFS','DATE','DATEVALUE','DAY','DAYS','DAYS360',
  'DB','DCOUNT','DDB','DELTA','DEVSQ','DGET','DMAX','DMIN','DPRODUCT','DSTDEV','DSUM',
  'DURATION','EDATE','EOMONTH','ERROR.TYPE','EXACT','EXP','FACT','FALSE','FILTER','FIND',
  'FLOOR','FORECAST','FV','FVSCHEDULE','GETPIVOTDATA','GROWTH','HLOOKUP','HOUR','HYPERLINK',
  'IF','IFERROR','IFNA','IFS','INDEX','INDIRECT','INFO','INT','INTERCEPT','IPMT','IRR','ISBLANK',
  'ISERR','ISERROR','ISEVEN','ISLOGICAL','ISNA','ISNONTEXT','ISNUMBER','ISODD','ISREF','ISTEXT',
  'LARGE','LEFT','LEN','LINEST','LN','LOG','LOG10','LOOKUP','LOWER','MATCH','MAX','MAXA','MAXIFS',
  'MEDIAN','MID','MIN','MINA','MINIFS','MINUTE','MIRR','MOD','MODE','MONTH','MROUND','N','NA',
  'NETWORKDAYS','NOT','NOW','NPER','NPV','NUMBERVALUE','ODD','OFFSET','OR','PERCENTILE',
  'PERCENTRANK','PERIOD','PI','PMT','PPMT','PRODUCT','PROPER','PV','QUARTILE','QUOTIENT',
  'RADIANS','RAND','RANDBETWEEN','RANK','RATE','REPLACE','REPT','RIGHT','ROMAN','ROUND',
  'ROUNDDOWN','ROUNDUP','ROW','ROWS','SEARCH','SECOND','SIGN','SIN','SINH','SLOPE','SMALL',
  'SORT','SORTBY','SQRT','STDEV','STDEVA','SUBSTITUTE','SUM','SUMIF','SUMIFS','SUMPRODUCT',
  'SWITCH','T','TAN','TANH','TEXT','TIME','TIMEVALUE','TODAY','TRANSPOSE','TRIM','TRUE',
  'TRUNC','TYPE','UNIQUE','UPPER','VALUE','VLOOKUP','WEEKDAY','WEEKNUM','WORKDAY','XIRR',
  'XLOOKUP','XMATCH','XNPV','YEAR','YEARFRAC'
].join('|');

function highlightExcel(rawText) {
  // Escape HTML dulu
  let s = rawText
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // 1. String "teks" → biru muda
  s = s.replace(/"([^"]*)"/g, '<span class="excel-str">"$1"</span>');

  // 2. Error Excel (#REF!, #N/A, #VALUE!, dll)
  s = s.replace(/#(REF!|N\/A|VALUE!|DIV\/0!|NULL!|NUM!|NAME\?|SPILL!|CALC!|GETTING_DATA)/g,
    '<span class="excel-error">#$1</span>');

  // 3. Nama Sheet diikuti tanda seru (Sheet1! atau 'My Sheet'!)
  s = s.replace(/('(?:[^']|'')*'|[A-Za-z_\u00C0-\u024F][A-Za-z0-9_\u00C0-\u024F]*)(!)/g,
    '<span class="excel-sheet">$1$2</span>');

  // 4. Fungsi Excel (sebelum tanda kurung)
  const fnRe = new RegExp('\\b(' + EXCEL_FUNCTIONS + ')(?=\\s*\\()', 'g');
  s = s.replace(fnRe, '<span class="excel-fn">$1</span>');

  // 5. TRUE / FALSE
  s = s.replace(/\b(TRUE|FALSE)\b/g, '<span class="excel-bool">$1</span>');

  // 6. Referensi sel: A1, $B$2, A1:C5, R1C1, dll
  s = s.replace(/\b(\$?[A-Za-z]{1,3}\$?\d+(?::\$?[A-Za-z]{1,3}\$?\d+)?)\b/g,
    '<span class="excel-ref">$1</span>');

  // 7. Angka
  s = s.replace(/(?<![a-zA-Z"])(-?\b\d+(?:\.\d+)?(?:[Ee][+-]?\d+)?%?)\b/g,
    '<span class="excel-num">$1</span>');

  // 8. Operator = + - * / & ^ < > ,
  s = s.replace(/([=+\-*/&^<>,])/g, '<span class="excel-op">$1</span>');

  return s;
}

// ══════════════════════════════════════════
// AUTO-DETECT LANGUAGE
// ══════════════════════════════════════════
const LANG_DOTS = {
  javascript: '#f0db4f', python: '#3572A5', html: '#e34c26',
  css: '#563d7c', sql: '#e38c00', bash: '#89e051',
  java: '#b07219', 'c++': '#f34b7d', typescript: '#2b7489',
  excel: '#1d6f42', json: '#292929', xml: '#0060ac',
  php: '#4F5D95', ruby: '#701516', go: '#00ADD8',
  rust: '#dea584', swift: '#ffac45', kotlin: '#A97BFF',
  dart: '#00B4AB', shell: '#89e051', powershell: '#012456',
  yaml: '#cb171e', markdown: '#083fa1', code: '#8b949e'
};

function detectLanguage(code, hintLang) {
  const c = code.trim();

  // Jika ada hint dari fenced code block
  if (hintLang) {
    const h = hintLang.toLowerCase();
    if (h === 'excel' || h === 'xlsx' || h === 'formula') return 'excel';
    return h;
  }

  // Excel formula: dimulai dengan =FunctionName( atau =CellRef atau array formula {=
  if (/^[{]?=\s*[A-Z]/.test(c) || /^=\s*(SUM|IF|VLOOKUP|INDEX|MATCH|COUNTIF|SUMIF|AVERAGE|MAX|MIN|IFERROR|AND|OR|XLOOKUP|FILTER|SORT|UNIQUE|TEXT|DATE|NOW|TODAY)\s*\(/i.test(c)) {
    return 'excel';
  }
  // Jika banyak baris dimulai dengan =
  const lines = c.split('\n').filter(l => l.trim());
  if (lines.length > 0 && lines.filter(l => /^\s*=/.test(l)).length / lines.length > 0.5) {
    return 'excel';
  }

  // Gunakan hljs auto-detect jika tersedia
  if (typeof hljs !== 'undefined') {
    try {
      const result = hljs.highlightAuto(c, [
        'javascript','typescript','python','html','css','sql','bash','shell',
        'java','cpp','json','xml','yaml','php','ruby','go','rust','swift','kotlin','dart','powershell'
      ]);
      return result.language || 'code';
    } catch { return 'code'; }
  }
  return 'code';
}

function applyHighlight(code, lang) {
  if (lang === 'excel') return highlightExcel(code);
  if (typeof hljs === 'undefined') return escHtml(code);
  try {
    if (lang && lang !== 'code' && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  } catch {
    return escHtml(code);
  }
}

// ══════════════════════════════════════════
// HELPER: proses stream SSE
// ══════════════════════════════════════════
async function processStream(response, streamId, onDone) {
  const bubbleEl  = document.getElementById(`bubble_${streamId}`);
  const actionsEl = document.getElementById(`actions_${streamId}`);
  const streamRow = document.getElementById(streamId);
  const reader    = response.body.getReader();
  const decoder   = new TextDecoder();
  let fullText  = '';
  let buffer    = '';
  let firstToken = true;
  let gotDone   = false;
  let renderScheduled = false;

  function flushStreamingRender(finalRender = false) {
    if (!bubbleEl) return;
    bubbleEl.innerHTML = finalRender ? formatContent(fullText) : renderStreamingContent(fullText);
    if (finalRender) bubbleEl.classList.remove('stream-cursor');
    else bubbleEl.classList.add('stream-cursor');
    scrollBottom();
  }

  function scheduleStreamingRender() {
    if (renderScheduled) return;
    renderScheduled = true;
    requestAnimationFrame(() => {
      renderScheduled = false;
      if (!gotDone) flushStreamingRender(false);
    });
  }

  function processLine(line) {
    if (!line.startsWith('data: ')) return;
    const raw = line.slice(6).trim();
    if (raw === '[DONE]') return;

    let parsed;
    try { parsed = JSON.parse(raw); }
    catch { return; }

    if (parsed.error) throw new Error(parsed.error);

    if (parsed.token) {
      if (firstToken) { bubbleEl.innerHTML = ''; firstToken = false; }
      fullText += parsed.token;
      scheduleStreamingRender();
    }

    if (parsed.done) {
      gotDone = true;
      flushStreamingRender(true);
      actionsEl.style.display = 'flex';
      streamRow.setAttribute('data-id', parsed.message_id || '');
      streamRow.setAttribute('data-plain-text', encodeURIComponent(fullText));
      onDone(parsed, fullText);
      scrollBottom();
    }
  }

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        processLine(line);
      }
    }

    // Flush sisa buffer
    buffer += decoder.decode();
    if (buffer.trim()) {
      const lines = buffer.split('\n');
      for (const line of lines) {
        processLine(line);
      }
    }
  } catch (e) {
    console.error('[processStream] Error:', e.message);
  }

  // FALLBACK: jika stream terputus tanpa event `done` tapi sudah ada teks
  if (!gotDone && fullText.trim()) {
    console.warn('[processStream] Stream ended without done event. Fallback triggered.');
    flushStreamingRender(true);
    actionsEl.style.display = 'flex';
    streamRow.setAttribute('data-plain-text', encodeURIComponent(fullText));
    onDone({ done: true, session_id: null, message_id: null, user_message_id: null }, fullText);
    scrollBottom();
  }

  setTimeout(initStickyCodeHeaders, 600);
}

// ══════════════════════════════════════════
// KIRIM PESAN BARU
// ══════════════════════════════════════════
async function sendMessage(text, files = []) {
  const area = document.getElementById('chatArea');
  if (!area.querySelector('.msg-row')) area.innerHTML = '';

  appendMessage('user', text, null, { files: files });
  scrollBottom();

  const streamId = 'stream_' + Date.now();
  const timeStr  = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  area.insertAdjacentHTML('beforeend', buildStreamBubbleHTML(streamId, timeStr));
  scrollBottom();

  setSendBtn('stop');
  abortController = new AbortController();

  // Timeout 2 menit untuk respons panjang
  const timeoutId = setTimeout(() => abortController.abort(), 120000);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: abortController.signal,
      body: JSON.stringify({
        message: text,
        session_id: currentSessionId,
        user_id: currentUser.id,
        persona_name: currentPersona,
        files: files
      })
    });

    clearTimeout(timeoutId);

    if (!res.ok) {
      let errMsg = `Server error ${res.status}`;
      try { const d = await res.json(); errMsg = d.error || errMsg; }
      catch { try { errMsg = (await res.text()) || errMsg; } catch {} }
      throw new Error(errMsg);
    }

    await processStream(res, streamId, (parsed, fullText) => {
      if (parsed.session_id && !currentSessionId) {
        currentSessionId = parsed.session_id;
        localStorage.setItem('aai_last_session', currentSessionId);
        setTimeout(async () => {
          await loadSessions();
          const s = sessions.find(s => s.id === currentSessionId);
          if (s) document.getElementById('topbarTitle').textContent = s.title;
        }, 2500);
      }
      const userRows = document.getElementById('chatArea').querySelectorAll('.msg-row.user');
      if (userRows.length > 0)
        userRows[userRows.length - 1].setAttribute('data-id', parsed.user_message_id || '');
      const lastAI = [...currentMessages].reverse().find(m => m.role === 'assistant');
      currentMessages.push({
        id: parsed.user_message_id, role: 'user', content: text,
        parent_id: lastAI?.id || null, created_at: new Date().toISOString()
      });
      currentMessages.push({
        id: parsed.message_id, role: 'assistant', content: fullText,
        parent_id: parsed.user_message_id, created_at: new Date().toISOString()
      });
    });

    } catch (e) {
    console.error('❌ SendMessage Error:', e);
    clearTimeout(timeoutId);
    const bubbleEl = document.getElementById(`bubble_${streamId}`);
    if (bubbleEl) {
      bubbleEl.classList.remove('stream-cursor');
      const errorMsg = e.message.includes('Provider returned error')
        ? '⚠️ Provider error – cek koneksi / API key'
        : e.message;
      bubbleEl.innerHTML = `
        <span style="color:#e74c3c;">⚠️ ${errorMsg}</span>
        <button onclick="retryLastMessage(this)"
          style="margin-left:12px;background:var(--blue-light);border:none;padding:4px 12px;
                 border-radius:12px;cursor:pointer;font-size:13px;color:var(--blue-dark);">
          🔄 Coba lagi
        </button>`;
    }
    const actionsEl = document.getElementById(`actions_${streamId}`);
    if (actionsEl) actionsEl.style.display = 'flex';
  } finally {
    setSendBtn('send');
  }
}

// ══════════════════════════════════════════
// REGENERATE
// ══════════════════════════════════════════
function regenerateAI(btn) {
  const aiRow   = btn.closest('.msg-row.assistant');
  const aiMsgId = aiRow.getAttribute('data-id');
  let rawUser = '', userMsgId = null;

  let el = aiRow.previousElementSibling;
  while (el) {
    if (el.classList.contains('user')) {
      rawUser   = decodeURIComponent(el.getAttribute('data-raw') || '');
      userMsgId = el.getAttribute('data-id') || null;
      break;
    }
    el = el.previousElementSibling;
  }
  if (!userMsgId && aiMsgId) {
    const aiMsg = currentMessages.find(m => m.id === aiMsgId);
    userMsgId = aiMsg?.parent_id || null;
    if (!rawUser) rawUser = currentMessages.find(m => m.id === userMsgId)?.content || '';
  }
  if (rawUser) executeRegenerate(rawUser, userMsgId, aiMsgId, aiRow);
}

async function executeRegenerate(text, userMessageId = null, assistantMessageId = null, aiRow = null) {
  const area = document.getElementById('chatArea');
  const streamId = assistantMessageId ? `regen_${assistantMessageId}` : 'regen_' + Date.now();

  if (aiRow) {
    prepareAssistantRowForStreaming(aiRow, streamId);
  } else {
    const timeStr  = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    area.insertAdjacentHTML('beforeend', buildStreamBubbleHTML(streamId, timeStr));
    scrollBottom();
  }

  setSendBtn('stop');
  abortController = new AbortController();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: abortController.signal,
      body: JSON.stringify({
        message: text,
        session_id: currentSessionId,
        user_id: currentUser.id,
        persona_name: currentPersona,
        user_message_id: userMessageId,
        assistant_message_id: assistantMessageId
      })
    });

    if (!res.ok) {
      let errMsg = `Server error ${res.status}`;
      try { const d = await res.json(); errMsg = d.error || errMsg; }
      catch { try { errMsg = (await res.text()) || errMsg; } catch {} }
      throw new Error(errMsg);
    }

    await processStream(res, streamId, (parsed, fullText) => {
      const resolvedAssistantId = parsed.message_id || assistantMessageId;
      const existingAssistant = currentMessages.find(m => m.id === resolvedAssistantId);
      if (existingAssistant) {
        existingAssistant.content = fullText;
        existingAssistant.parent_id = userMessageId;
      } else {
        currentMessages.push({
          id: resolvedAssistantId, role: 'assistant', content: fullText,
          parent_id: userMessageId, created_at: new Date().toISOString()
        });
      }
      if (userMessageId && resolvedAssistantId) activeVersionMap[userMessageId] = resolvedAssistantId;
      renderMessageTree();
    });

    } catch (e) {
    console.error('❌ Regenerate Error:', e);
    const bubbleEl = document.getElementById(`bubble_${streamId}`);
    if (bubbleEl) {
      bubbleEl.classList.remove('stream-cursor');
      const errorMsg = e.message.includes('Provider returned error')
        ? '⚠️ Provider error – cek koneksi / API key'
        : e.message;
      bubbleEl.innerHTML = `
        <span style="color:#e74c3c;">⚠️ ${errorMsg}</span>
        <button onclick="retryLastMessage(this)"
          style="margin-left:12px;background:var(--blue-light);border:none;padding:4px 12px;
                 border-radius:12px;cursor:pointer;font-size:13px;color:var(--blue-dark);">
          🔄 Coba lagi
        </button>`;
    }
    const actionsEl = document.getElementById(`actions_${streamId}`);
    if (actionsEl) actionsEl.style.display = 'flex';
  } finally {
    setSendBtn('send');
  }
}

// ══════════════════════════════════════════
// TOMBOL "COBA LAGI"
// ══════════════════════════════════════════
function retryLastMessage(btn) {
  const aiRow = btn.closest('.msg-row.assistant');
  const aiMsgId = aiRow.getAttribute('data-id') || null;
  let el = aiRow.previousElementSibling;
  while (el) {
    if (el.classList.contains('user')) {
      const raw       = decodeURIComponent(el.getAttribute('data-raw') || '');
      const userMsgId = el.getAttribute('data-id') || null;
      if (raw) {
        if (!aiMsgId) aiRow.remove();
        executeRegenerate(raw, userMsgId, aiMsgId, aiMsgId ? aiRow : null);
      }
      return;
    }
    el = el.previousElementSibling;
  }
}

// EDIT PESAN USER
// ══════════════════════════════════════════
function editUserMsg(btn) {
  const row    = btn.closest('.msg-row.user');
  const bubble = row.querySelector('.bubble');
  const raw    = decodeURIComponent(row.dataset.raw || bubble.innerText);
  const msgId  = row.dataset.id;

  if (!msgId) {
    alert('Pesan ini belum punya ID database. Refresh dulu lalu coba edit lagi.');
    return;
  }

  bubble.dataset.originalHtml = bubble.innerHTML;
  bubble.innerHTML = `
    <textarea class="edit-textarea" id="edt_${msgId}">${escHtml(raw)}</textarea>
    <div class="edit-actions">
      <button class="btn-edit-cancel" onclick="cancelEdit(this)">Batal</button>
      <button class="btn-edit-save" onclick="saveEdit(this, '${msgId}')">Kirim ▶</button>
    </div>`;

  const ta = document.getElementById(`edt_${msgId}`);
  ta.focus();
  ta.selectionStart = ta.selectionEnd = ta.value.length;
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(bubble.querySelector('.btn-edit-save'), msgId); }
    if (e.key === 'Escape') cancelEdit(bubble.querySelector('.btn-edit-cancel'));
  });
}

function cancelEdit(btn) {
  const bubble = btn.closest('.bubble');
  bubble.innerHTML = bubble.dataset.originalHtml;
}

async function saveEdit(btn, msgId) {
  const bubble = btn.closest('.bubble');
  const row    = btn.closest('.msg-row.user');
  if (!row || !bubble) return;

  const newText = bubble.querySelector('textarea').value.trim();
  if (!newText) return;

  bubble.innerHTML = formatContent(newText);
  row.setAttribute('data-raw', encodeURIComponent(newText));

  let assistantMsgId = null;
  let nextRow = row.nextElementSibling;
  while (nextRow) {
    if (nextRow.classList.contains('assistant')) {
      assistantMsgId = nextRow.getAttribute('data-id') || null;
      break;
    }
    nextRow = nextRow.nextElementSibling;
  }
  if (!assistantMsgId) {
    assistantMsgId = currentMessages.find(m => m.parent_id === msgId && m.role === 'assistant')?.id || null;
  }

  try {
    const res = await fetch(`/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        edit_message_id: msgId,
        update_only: true,
        message: newText,
        session_id: currentSessionId,
        user_id: currentUser.id,
        persona_name: currentPersona
      })
    });
    if (!res.ok) throw new Error('Gagal update');
    const msg = currentMessages.find(m => m.id === msgId);
    if (msg) msg.content = newText;
    renderMessageTree();
    const refreshedUserRow = document.querySelector(`.msg-row.user[data-id="${msgId}"]`);
    const refreshedAssistantRow = assistantMsgId
      ? document.querySelector(`.msg-row.assistant[data-id="${assistantMsgId}"]`)
      : null;
    executeRegenerate(newText, msgId, assistantMsgId, refreshedAssistantRow);
  } catch (e) {
    alert('Gagal menyimpan perubahan: ' + e.message);
    renderMessageTree();
  }
}

async function loadSessions() {
  try {
    const res  = await fetch(`/api/sessions?user_id=${currentUser.id}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    sessions = Array.isArray(data) ? data : (data.sessions || []);
    renderSidebar();
  } catch (e) {
    logDebug(`Gagal load sessions: ${e.message}`, '#e74c3c');
    sessions = []; renderSidebar();
  }
}

async function loadSession(id) {
  currentSessionId = id;
  localStorage.setItem('aai_last_session', id);
  const session = sessions.find(s => s.id === id);
  document.getElementById('topbarTitle').textContent = session?.title || 'AAi';
  currentMessages  = [];
  activeVersionMap = {};
  document.getElementById('chatArea').innerHTML = `
    <div style="padding:60px;text-align:center;color:var(--text-muted);">
      <i class="fas fa-spinner fa-spin" style="font-size:28px;"></i>
      <p style="margin-top:12px;">Memuat percakapan...</p>
    </div>`;
  try {
    const res = await fetch(`/api/chat?session_id=${id}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.success && Array.isArray(data.messages)) {
      currentMessages = data.messages;
      renderMessageTree();
    } else throw new Error("Format data tidak valid");
    if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
    renderSidebar();
  } catch (e) {
    logDebug(`Error load session: ${e.message}`, '#e74c3c');
    document.getElementById('chatArea').innerHTML =
      `<div style="padding:40px;text-align:center;color:#e74c3c;">⚠️ Gagal memuat: ${e.message}</div>`;
  }
}

function renderSidebar() {
  const container = document.getElementById('sessionList');
  container.innerHTML = '';
  if (!sessions.length) {
    container.innerHTML = `<p style="padding:24px;text-align:center;color:var(--text-muted);font-size:14px;">Belum ada obrolan.<br>Mulai yang baru di atas 👆</p>`;

        <span style="flex:1;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(s.title || 'Obrolan')}</span>
      </div>

        <button class="action-btn" title="Edit"

async function renameSession(id, oldTitle) {
  const newTitle = prompt("Judul baru:", oldTitle);
  if (!newTitle?.trim() || newTitle === oldTitle) return;
  const idx = sessions.findIndex(s => s.id === id);
  if (idx !== -1) { sessions[idx].title = newTitle.trim(); renderSidebar(); }

}

// ══════════════════════════════════════════
// MESSAGE TREE
// ══════════════════════════════════════════
function buildActiveBranch() {
  if (!currentMessages.length) return [];
  const allIds = new Set(currentMessages.map(m => m.id));
  let current = currentMessages.find(m => !m.parent_id || !allIds.has(m.parent_id));
  if (!current) current = [...currentMessages].sort((a, b) => new Date(a.created_at) - new Date(b.created_at))[0];
  if (!current) return [];
  const branch = [current];
  while (true) {
    const children = currentMessages.filter(m => m.parent_id === current.id);
    if (!children.length) break;
    const selectedId = activeVersionMap[current.id];
    current = (selectedId && children.find(c => c.id === selectedId)) || children[children.length - 1];
    branch.push(current);
  }
  return branch;
}

function switchVersion(id) {
  const msg = currentMessages.find(m => m.id === id);
  if (!msg?.parent_id) return;
  activeVersionMap[msg.parent_id] = id;
  renderMessageTree(); scrollBottom();
}

function renderMessageTree() {
  const area   = document.getElementById('chatArea');
  const branch = buildActiveBranch();
  if (!branch.length) { logDebug('Branch kosong, skip render', '#e67e22'); return; }
  area.innerHTML = '';
  branch.forEach(m => {
    const siblings = currentMessages.filter(s => s.parent_id === m.parent_id && s.role === m.role);
    const idx      = siblings.findIndex(s => s.id === m.id);
    appendMessage(m.role, m.content, m.created_at, null, m.id, {
      total: siblings.length, current: idx + 1, siblings: siblings.map(s => s.id)
    });
  });
  scrollBottom();
  setTimeout(initStickyCodeHeaders, 400);
}

    </div>`;

      } else {

          const icon = f.type?.includes('word') ? '📝' : f.type?.includes('sheet') ? '📊' : f.type?.includes('pdf') ? '📕' : '📄';
          filesHtml += `<div style="display:flex;align-items:center;gap:5px;background:#fff;padding:5px 8px;border-radius:8px;font-size:12px;border:1px solid var(--blue-light);color:var(--text);">
            <span style="font-size:16px;">${icon}</span>
            <span style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</span>
          </div>`;
        }
      });
      filesHtml += `</div>`;
    }

    html = `
    <div class="msg-row user" data-raw="${encodeURIComponent(content)}" data-id="${messageId||''}">
      <div style="flex:1;width:100%;">
        <div class="bubble">${formatContent(content)}</div>
        ${filesHtml}
        <div class="user-actions">
          <span style="font-size:11px;opacity:.65;margin-right:auto;">${time}</span>
          <button title="Edit" onclick="editUserMsg(this)"><i class="fas fa-pen"></i></button>
          <button title="Copy" onclick="copyUserMsg(this)"><i class="far fa-copy"></i></button>
        </div>
      </div>
    </div>`;
  }

  area.insertAdjacentHTML('beforeend', html);
  scrollBottom();
}

// ══════════════════════════════════════════
// COPY
// ══════════════════════════════════════════
function copyUserMsg(btn) {
  navigator.clipboard.writeText(btn.closest('.user').querySelector('.bubble').innerText);
  const i = btn.querySelector('i'); i.className = 'fas fa-check';
  setTimeout(() => i.className = 'far fa-copy', 2000);
}
function copyFullAI(btn) {
  navigator.clipboard.writeText(btn.closest('.assistant').querySelector('.bubble').innerText);
  const i = btn.querySelector('i'); i.className = 'fas fa-check'; i.style.color = '#5ab4d4';
  setTimeout(() => { i.className = 'far fa-copy'; i.style.color = 'inherit'; }, 2000);
}

// ══════════════════════════════════════════
// MARKED RENDERER — dengan hljs + Excel
// ══════════════════════════════════════════
const renderer = new marked.Renderer();

renderer.code = function(code, language) {
  // Marked v2 vs v4 compat
  const rawLang = (typeof code === 'object' ? (code.lang || '') : (language || ''));
  const text    = typeof code === 'object' ? (code.text || code) : code;

  // Auto-detect bahasa
  const lang = detectLanguage(String(text), rawLang ? rawLang.toLowerCase() : '');

  // Syntax highlighting
  const highlighted = applyHighlight(String(text), lang);

  // Warna titik di header sesuai bahasa
  const dotColor = LANG_DOTS[lang] || LANG_DOTS['code'];

  return `<div class="code-window">
  <div class="code-header">
    <span class="code-header-lang">
      <span class="lang-dot" style="background:${dotColor};color:${dotColor};"></span>
      ${lang ? lang.charAt(0).toUpperCase() + lang.slice(1).toLowerCase() : 'Code'}
    </span>
    <div class="code-header-actions">
      <button class="copy-code-btn" onclick="toggleCodeWindow(this)">
        <i class="fas fa-chevron-up"></i> <span class="btn-text">Minimize</span>
      </button>
      <button class="copy-code-btn" onclick="copyCodeWindow(this)">
        <i class="fas fa-copy"></i> Copy
      </button>
    </div>
  </div>
  <div class="code-scroll-area">
    <pre class="hljs-pre"><code class="hljs">${highlighted}</code></pre>
  </div>
</div>`;
};

marked.setOptions({ renderer, breaks: true });

function copyCodeWindow(btn) {
  const pre = btn.closest('.code-window').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent);
  const orig = btn.innerHTML;
  btn.innerHTML = '<i class="fas fa-check"></i> Copied!'; btn.style.color = '#a5d6ff';
  setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
}
function toggleCodeWindow(btn) {
  const codeWindow = btn.closest('.code-window');
  const scrollArea = codeWindow.querySelector('.code-scroll-area');
  const pre        = codeWindow.querySelector('pre');
  const icon       = btn.querySelector('i');
  const span       = btn.querySelector('.btn-text');

  const isMin = codeWindow.classList.toggle('minimized');

  if (isMin) {
    // Collapse
    pre.classList.add('minimized');
    scrollArea.style.maxHeight = '0px';
    icon.className = 'fas fa-chevron-down';
    span.textContent = 'Expand';
    codeWindow.classList.remove('scrolled');
  } else {
    // Expand
    pre.classList.remove('minimized');
    scrollArea.style.maxHeight = scrollArea.scrollHeight + 'px';
    icon.className = 'fas fa-chevron-up';
    span.textContent = 'Minimize';

    // Reset supaya bisa scroll lagi setelah animasi
    setTimeout(() => {
      scrollArea.style.maxHeight = 'none';
    }, 350);
  }
}
function formatContent(text) {
  if (!text) return "<em style='color:#e74c3c;'>⚠️ Respons kosong.</em>";
  let html = marked.parse(text);
  html = html.replace(/Sumber:\s*(https?:\/\/[^\s<]+)/gi,
    `<div class="source-card">🌐 <a href="$1" target="_blank" style="color:#2a7a9e">$1</a></div>`);
  return html;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function scrollBottom() {
  const a = document.getElementById('chatArea'); a.scrollTop = a.scrollHeight;
}

// ══════════════════════════════════════════

// ══════════════════════════════════════════
function toggleSettingsMenu() {
  const menu = document.getElementById('settingsMenu');
  menu.classList.toggle('show');

// ══════════════════════════════════════════
// ✅ FIX 1: ENTER KEY — HP = ganti baris, Desktop = kirim
// ══════════════════════════════════════════
function handleKey(e) {
  if (e.key !== 'Enter' || e.shiftKey) return;

  const inp = document.getElementById('messageInput');
  const val = inp.value;
  const pos = inp.selectionStart;

  // Cari baris aktif saat ini
  const lineStart  = val.lastIndexOf('\n', pos - 1) + 1;
  const currentLine = val.substring(lineStart, pos);

  // Cocokkan pola "1. teks" atau "12. teks"
  const match = currentLine.match(/^(\d+)\.\s(.*)/);
  if (match) {
    e.preventDefault();
    if (match[2].trim() === '') {
      // Item kosong → batalkan list, hapus "N. " di baris ini
      inp.value = val.substring(0, lineStart) + val.substring(pos);
      inp.selectionStart = inp.selectionEnd = lineStart;
    } else {
      // Lanjutkan penomoran
      const next = parseInt(match[1]) + 1;
      const ins  = '\n' + next + '. ';
      inp.value = val.substring(0, pos) + ins + val.substring(pos);
      inp.selectionStart = inp.selectionEnd = pos + ins.length;
    }
    autoResize(inp);
    return;
  }

  const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if (!isTouchDevice) {
    e.preventDefault();
    handleSend();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

// ── File Upload Logic ──
document.getElementById('fileInput').addEventListener('change', function(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    if (!selectedFiles.find(f => f.name === file.name && f.size === file.size)) {
      selectedFiles.push(file);
    }
  });
  renderFilePreview();
  this.value = '';
});

function renderFilePreview() {
  const container = document.getElementById('filePreview');
  container.innerHTML = '';
  selectedFiles.forEach((file, index) => {
    const div = document.createElement('div');
    div.className = 'file-preview-item';
    const isImage = file.type.startsWith('image/');
    div.innerHTML = `
      ${isImage
        ? `<img src="${URL.createObjectURL(file)}" alt="preview">`
        : `<i class="fas fa-file-alt file-icon"></i>`
      }
      <div class="file-name">${file.name}</div>
      <span class="remove-file" onclick="removeFile(${index})">×</span>
    `;
    container.appendChild(div);
  });
}

function removeFile(index) {
  const file = selectedFiles[index];
  if (file && file.type.startsWith('image/')) {
    const img = document.querySelectorAll('.file-preview-item img')[index];
    if (img) URL.revokeObjectURL(img.src);
  }
  selectedFiles.splice(index, 1);
  renderFilePreview();
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}

async function handleSend() {
  const inp = document.getElementById('messageInput');
  const text = inp.value.trim();
  if (!text && selectedFiles.length === 0) return;

  const sendBtn = document.getElementById('sendBtn');
  const originalHTML = sendBtn.innerHTML;
  sendBtn.disabled = true;
  sendBtn.innerHTML = '⏳';

  try {
    const oversized = selectedFiles.find(f => f.size > 2 * 1024 * 1024);
    if (oversized) throw new Error(`File "${oversized.name}" >2MB. Kompres dulu ya.`);

    const filesPayload = await Promise.all(selectedFiles.map(async f => ({
      name: f.name, type: f.type, base64: await fileToBase64(f)
    })));

    inp.value = ''; autoResize(inp);
    const previewContainer = document.getElementById('filePreview');
    previewContainer.classList.add('fading-out');

    sendMessage(text, filesPayload);

    setTimeout(() => {
      selectedFiles = [];
      renderFilePreview();
      previewContainer.classList.remove('fading-out');
    }, 300);

  } catch (err) {
    console.error('❌ Gagal kirim:', err);
    alert(err.message || 'Terjadi kesalahan.');
    document.getElementById('filePreview').classList.remove('fading-out');
  } finally {
    sendBtn.disabled = false;
    sendBtn.innerHTML = originalHTML;
  }
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
document.addEventListener('click', e => {
  if (window.innerWidth > 768) return;
  const sidebar   = document.getElementById('sidebar');
  const hamburger = document.querySelector('.hamburger');
  if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !hamburger.contains(e.target))
    sidebar.classList.remove('open');
});
function logout() {
  if (confirm("Yakin mau keluar?")) {
    localStorage.removeItem('aai_user');
    window.location.href = '/login';
  }
}

// === STICKY HEADER + TRANSPARENT BACKGROUND ===
function initStickyCodeHeaders() {
  document.querySelectorAll('.code-window').forEach(codeWindow => {
    const scrollArea = codeWindow.querySelector('.code-scroll-area');
    
    if (scrollArea) {
      const handleScroll = () => {
        if (scrollArea.scrollTop > 12) {
          codeWindow.classList.add('scrolled');
        } else {
          codeWindow.classList.remove('scrolled');
        }
      };
      
      scrollArea.addEventListener('scroll', handleScroll);
      
      // Reset saat pertama kali
      handleScroll();
    }
  });
}
