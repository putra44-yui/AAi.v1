<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AAi — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --blue:        #8ed3ec;
  --blue-light:  #c8eaf5;   /* baby blue dibanyakin */
  --blue-mid:    #5ab4d4;
  --pink:        #f9c4d8;
  --pink-light:  #fde8f1;
  --purple:      #d2b3e6;
  --purple-light:#f0e6f8;
  --white:       #ffffff;
  --off-white:   #f4f9ff;   /* lebih biru muda */
  --text:        #2d3557;
  --text-muted:  #8b93b8;
  --sidebar-w:   280px;
  --radius:      18px;
}
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--off-white);
    color: var(--text);
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 20%, rgba(126,200,227,.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 90% 80%, rgba(201,168,224,.16) 0%, transparent 70%),
      radial-gradient(ellipse 30% 30% at 70% 10%, rgba(247,184,208,.13) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    background: rgba(255,255,255,.78);
    backdrop-filter: blur(18px);
    border-right: 1px solid rgba(126,200,227,.22);
    display: flex; flex-direction: column;
    z-index: 10; position: relative;
  }
  .sidebar-header { padding: 24px 20px 18px; border-bottom: 1px solid rgba(126,200,227,.18); }

  .logo {
    display: flex; align-items: center; gap: 11px;
    text-decoration: none; margin-bottom: 18px;
  }
  .logo-icon {
    width: 42px; height: 42px; border-radius: 13px;
    background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 60%, var(--pink) 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(90,180,212,.35);
    flex-shrink: 0; position: relative; overflow: hidden;
  }
  .logo-icon::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,transparent 60%);
  }
  .logo-icon svg { width:24px; height:24px; fill:white; position:relative; z-index:1; }
  .logo-text { display:flex; flex-direction:column; line-height:1; }
  .logo-name {
    font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:700;
    background:linear-gradient(120deg,var(--blue-mid) 0%,var(--purple) 60%,var(--pink) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    letter-spacing:-.5px;
  }
  .logo-sub { font-size:10px; color:var(--text-muted); font-weight:400; letter-spacing:.8px; text-transform:uppercase; margin-top:1px; }

  .new-chat-btn {
    width:100%; padding:10px 16px;
    background:linear-gradient(135deg,var(--blue) 0%,var(--purple) 100%);
    color:white; border:none; border-radius:12px;
    font-family:'DM Sans',sans-serif; font-size:13.5px; font-weight:500;
    cursor:pointer; display:flex; align-items:center; gap:8px;
    transition:opacity .2s, transform .15s;
    box-shadow:0 3px 12px rgba(90,180,212,.3);
  }
  .new-chat-btn:hover { opacity:.88; transform:translateY(-1px); }
  .new-chat-btn svg { width:16px; height:16px; }

  .sidebar-body { flex:1; overflow-y:auto; padding:12px; }
  .sidebar-body::-webkit-scrollbar { width:4px; }
  .sidebar-body::-webkit-scrollbar-thumb { background:var(--blue-light); border-radius:99px; }

  .session-group-label {
    font-size:10.5px; font-weight:600; color:var(--text-muted);
    letter-spacing:.7px; text-transform:uppercase; padding:8px 10px 4px;
  }
  .session-item {
    padding:9px 12px; border-radius:11px; cursor:pointer;
    display:flex; align-items:center; gap:10px;
    transition:background .15s; margin-bottom:2px;
  }
  .session-item:hover { background: rgba(200,234,245,.18); }
  .session-item.active { background:linear-gradient(120deg,rgba(126,200,227,.22) 0%,rgba(201,168,224,.15) 100%); }
  .session-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; background:linear-gradient(135deg,var(--blue),var(--purple)); }
  .session-title { font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
  .session-item.active .session-title { font-weight:500; }
  .session-del {
    opacity:0; background:none; border:none; cursor:pointer;
    color:var(--text-muted); font-size:14px; padding:2px 4px; border-radius:5px;
    transition:opacity .15s,color .15s;
  }
  .session-item:hover .session-del { opacity:1; }
  .session-del:hover { color:#e07a9a; }

  /* User card di sidebar */
  .user-card {
    padding:14px 16px;
    border-top:1px solid rgba(126,200,227,.18);
    display:flex; align-items:center; gap:10px;
  }
  .user-avatar {
    width:34px; height:34px; border-radius:10px;
    background:linear-gradient(135deg,var(--pink) 0%,var(--purple) 100%);
    display:flex; align-items:center; justify-content:center;
    font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:700;
    color:white; flex-shrink:0;
    box-shadow:0 2px 8px rgba(201,168,224,.3);
  }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:13px; font-weight:600; color:var(--text); }
  .user-role { font-size:11px; color:var(--text-muted); }
  .logout-btn {
    background:none; border:none; cursor:pointer;
    color:var(--text-muted); font-size:18px; padding:4px;
    border-radius:7px; transition:color .15s, background .15s;
    line-height:1;
  }
  .logout-btn:hover { color:#e07a9a; background:var(--pink-light); }

  /* ─── MAIN ─── */
  .main { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; z-index:1; }

  .topbar {
    padding:16px 28px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(255,255,255,.6); backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(126,200,227,.15);
  }
  .topbar-title {
    font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600;
    color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:420px;
  }
  .model-badge {
    font-size:11px; padding:4px 11px; border-radius:99px;
    background:linear-gradient(120deg,var(--blue-light),var(--purple-light));
    color:var(--text-muted); font-weight:500; letter-spacing:.3px; white-space:nowrap;
  }

  /* CHAT */
  .chat-area { flex:1; overflow-y:auto; padding:28px 28px 12px; display:flex; flex-direction:column; gap:18px; background: var(--off-white);}
  .chat-area::-webkit-scrollbar { width:5px; }
  .chat-area::-webkit-scrollbar-thumb { background:var(--blue-light); border-radius:99px; }

  .empty-state {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; text-align:center; animation:fadeUp .5s ease both; background: linear-gradient(135deg, rgba(200,234,245,.15), rgba(210,179,230,.1));
  }
  .empty-icon {
    width:68px; height:68px; border-radius:22px;
    background:linear-gradient(135deg,var(--blue) 0%,var(--purple) 60%,var(--pink) 100%);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 28px rgba(90,180,212,.3); margin-bottom:6px;
  }
  .empty-icon svg { width:34px; height:34px; fill:white; }
  .empty-state h2 {
    font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:700;
    background:linear-gradient(120deg,var(--blue-mid) 0%,var(--purple) 60%,var(--pink) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .empty-state p { color:var(--text-muted); font-size:14px; max-width:300px; line-height:1.6; }
  .empty-chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:8px; }
  .chip {
    padding:8px 16px; border-radius:99px; font-size:12.5px;
    border:1.5px solid rgba(126,200,227,.4); color:var(--text);
    background:rgba(255,255,255,.7); cursor:pointer; transition:all .2s;
  }
  .chip:hover { background:var(--blue-light); border-color:var(--blue); transform:translateY(-2px); }

  /* MESSAGES */
  .msg-row { display:flex; gap:12px; align-items:flex-end; animation:fadeUp .3s ease both; }
  .msg-row.user { flex-direction:row-reverse; }

  .avatar {
    width:32px; height:32px; border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700;
    background:linear-gradient(135deg,var(--blue) 0%,var(--purple) 100%);
    color:white; box-shadow:0 2px 8px rgba(90,180,212,.25);
    font-family:'Cormorant Garamond',serif;
  }
  .msg-row.user .avatar { background:linear-gradient(135deg,var(--pink) 0%,var(--purple) 100%); }

  .bubble { max-width:min(520px,72%); padding:12px 16px; border-radius:18px; font-size:14px; line-height:1.65; }
  .msg-row.assistant .bubble {
    background:rgba(255,255,255,.88); border:1px solid rgba(126,200,227,.25);
    border-bottom-left-radius:5px; box-shadow:0 2px 14px rgba(126,200,227,.12); color:var(--text);
  }
  .msg-row.user .bubble {
    background:linear-gradient(135deg,var(--blue-mid) 0%,var(--purple) 100%);
    color:white; border-bottom-right-radius:5px; box-shadow:0 3px 14px rgba(90,180,212,.28);
  }
  .bubble-time { font-size:10px; margin-top:4px; opacity:.55; text-align:right; }

  .typing-dots { display:flex; gap:5px; align-items:center; padding:4px 0; }
  .typing-dots span {
    width:7px; height:7px; border-radius:50%;
    background:var(--blue-mid); animation:bounce 1.1s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay:.18s; background:var(--purple); }
  .typing-dots span:nth-child(3) { animation-delay:.36s; background:var(--pink); }

  /* INPUT */
  .input-area { padding:16px 28px 22px; background:rgba(255,255,255,.6); backdrop-filter:blur(12px); border-top:1px solid rgba(126,200,227,.15); }
/* DIUBAH: Membuat input lebih bulat dan modern */
.input-wrap {
  display: flex;
  align-items: center;           
  background: rgba(255, 255, 255, 0.95); /* Putih bersih agar kontras */
  border: 1.5px solid rgba(142, 211, 236, 0.4);
  padding: 8px 18px;             /* Padding samping diperlebar */
  border-radius: 28px;           /* Kunci kebulatan ada di sini */
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  transition: all 0.3s ease;
}

.input-wrap:focus-within { 
  border-color: var(--blue); 
  box-shadow: 0 6px 20px rgba(90, 180, 212, 0.2); 
  transform: translateY(-1px);
}

#messageInput {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 14px;
  color: var(--text);
  resize: none;
  outline: none;
  max-height: 140px;
  min-height: 24px;
  line-height: 1.6;
  padding: 8px 0;                /* Memberi ruang napas pada teks */
}
  #messageInput::placeholder { color:var(--text-muted); }
  .send-btn {
    width:38px; height:38px; flex-shrink:0; border-radius:12px; border:none; cursor:pointer;
    background:linear-gradient(135deg,var(--blue-mid) 0%,var(--purple) 100%);
    color:white; display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 12px rgba(90,180,212,.3); transition:opacity .2s,transform .15s;
  }
  .send-btn:hover:not(:disabled) { opacity:.88; transform:scale(1.06); }
  .send-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
  .send-btn svg { width:17px; height:17px; }
  .input-hint { font-size:11px; color:var(--text-muted); text-align:center; margin-top:8px; letter-spacing:.2px; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  @media (max-width:640px) {
    .sidebar { display:none; }
    .chat-area { padding:16px 14px 8px; }
    .input-area { padding:12px 14px 16px; }
    .topbar { padding:12px 16px; }
  }

  /* DIUBAH: Optimasi khusus layar HP */
@media (max-width: 768px) {
  .sidebar { 
    display: none; /* Sembunyikan sidebar di HP agar lega */
  }
  
  .main { 
    width: 100%; 
  }

  .chat-area { 
    padding: 15px 15px 80px; /* Beri ruang bawah agar tidak tertutup input */
  }

  .bubble {
    max-width: 90%; /* Bubble lebih lebar di layar sempit */
    font-size: 14px;
  }

  .input-area {
    padding: 10px 15px 25px; /* Input area lebih rapat */
    position: fixed; /* Kunci di bawah layar */
    bottom: 0;
    left: 0;
    right: 0;
  }
  
  .input-wrap {
    border-radius: 25px; /* Tetap bulat tapi menyesuaikan layar */
  }
}
</style>
</head>
<body>

<!-- ─── SIDEBAR ─── -->
<aside class="sidebar">
  <div class="sidebar-header">
    <a class="logo" href="#">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">AAi</span>
        <span class="logo-sub">Ayaka &amp; Ayato AI</span>
      </div>
    </a>
    <button class="new-chat-btn" onclick="newChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Obrolan Baru
    </button>
  </div>

  <div class="sidebar-body" id="sessionList"></div>

  <div class="user-card" id="userCard">
    <!-- rendered by JS -->
  </div>
</aside>

<!-- ─── MAIN ─── -->
<main class="main">
<div class="topbar">
  <span class="topbar-title" id="topbarTitle">AAi — Asisten Kecerdasan Buatan</span>
  <div style="display:flex; align-items:center; gap:12px;">
    <span class="model-badge">llama-3.3-70b</span>
 <select id="personaSelect" onchange="changePersona(this.value)" 
        style="padding:6px 12px; border-radius:99px; background:rgba(200,234,245,.9); border:1px solid #8ed3ec; font-size:12.5px; font-weight:500;">
  <option value="Auto">✨ Auto Detect</option>
  <option value="Santai">Santai</option>
  <option value="Kritikus Brutal">Kritikus Brutal</option>
  <option value="Rosalia">🌹 Rosalia</option>
</select>
  </div>
</div>

  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      </div>
      <h2 id="greetingText">Halo! 👋</h2>
      <p>Tanya apa saja, saya siap membantu kamu.</p>
      <div class="empty-chips">
        <div class="chip" onclick="sendChip(this)">Ceritakan tentang dirimu</div>
        <div class="chip" onclick="sendChip(this)">Bantu saya belajar</div>
        <div class="chip" onclick="sendChip(this)">Tulis sebuah cerita</div>
        <div class="chip" onclick="sendChip(this)">Buat kode program</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="messageInput" rows="1" placeholder="Ketik pesan…"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="handleSend()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter kirim · Shift+Enter baris baru</p>
  </div>
</main>

<script>
// ─── AUTH & USER ───
const storedUser = localStorage.getItem('aai_user');
if (!storedUser) { window.location.href = '/login'; }
const currentUser = JSON.parse(storedUser || '{}');

document.getElementById('greetingText').textContent = `Halo, ${capitalize(currentUser.username || 'Kamu')}! 👋`;

(function renderUserCard() {
  const card = document.getElementById('userCard');
  const initial = (currentUser.username || '?')[0].toUpperCase();
  card.innerHTML = `
    <div class="user-avatar">${initial}</div>
    <div class="user-info">
      <div class="user-name">${capitalize(currentUser.username || '')}</div>
      <div class="user-role">Member</div>
    </div>
    <button class="logout-btn" onclick="logout()" title="Keluar">⏻</button>`;
})();

function logout() {
  localStorage.removeItem('aai_user');
  window.location.href = '/login';
}
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

// ─── STATE ───
let sessions = [];
let currentSessionId = null;
let currentPersona = localStorage.getItem('aai_persona') || 'Santai';

// ─── LOAD SESSIONS DARI SUPABASE ───
async function loadSessions() {
  const res = await fetch(`/api/sessions?user_id=${currentUser.id}`);
  if (res.ok) {
    sessions = await res.json();
    renderSidebar();
  } else {
    console.error("Gagal load sessions");
  }
}

function renderSidebar() {
  const list = document.getElementById('sessionList');
  list.innerHTML = '';
  if (!sessions.length) {
    list.innerHTML = `<p style="padding:16px 12px;font-size:12.5px;color:var(--text-muted);text-align:center">Belum ada riwayat.</p>`;
    return;
  }
  const label = document.createElement('div');
  label.className = 'session-group-label'; 
  label.textContent = 'Riwayat';
  list.appendChild(label);

  sessions.forEach(s => {
    const item = document.createElement('div');
    item.className = `session-item ${s.id === currentSessionId ? 'active' : ''}`;
    item.dataset.id = s.id;
    item.innerHTML = `
      <div class="session-dot"></div>
      <span class="session-title">${escHtml(s.title || 'Obrolan baru')}</span>
      <button class="session-del" onclick="deleteSession(event,'${s.id}')">✕</button>`;
    item.addEventListener('click', () => loadSession(s.id));
    list.appendChild(item);
  });
}

async function deleteSession(e, id) {
  e.stopPropagation();
  if (!confirm('Hapus sesi ini?')) return;
  const res = await fetch(`/api/sessions?id=${id}`, { method: 'DELETE' });
  if (res.ok) {
    sessions = sessions.filter(s => s.id !== id);
    if (currentSessionId === id) newChat();
    else renderSidebar();
  }
}

// ─── NEW CHAT ───
function newChat() {
  currentSessionId = null;
  document.getElementById('chatArea').innerHTML = `
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      </div>
      <h2>Obrolan Baru ✨</h2>
      <p>Tanya apa saja, saya siap membantu.</p>
      <div class="empty-chips">
        <div class="chip" onclick="sendChip(this)">Ceritakan tentang dirimu</div>
        <div class="chip" onclick="sendChip(this)">Bantu saya belajar</div>
        <div class="chip" onclick="sendChip(this)">Tulis sebuah cerita</div>
        <div class="chip" onclick="sendChip(this)">Buat kode program</div>
      </div>
    </div>`;
  document.getElementById('topbarTitle').textContent = 'AAi — Asisten Kecerdasan Buatan';
  renderSidebar();
}

// ─── LOAD SESSION ───
async function loadSession(id) {
  currentSessionId = id;
  const s = sessions.find(x => x.id === id);
  document.getElementById('topbarTitle').textContent = s ? s.title : 'Obrolan';

  const res = await fetch(`/api/messages?session_id=${id}`);
  const messages = await res.json();

  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  messages.forEach(m => {
    const time = new Date(m.created_at).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    appendBubble(m.role, m.content, time, false);
  });
  scrollBottom();
  renderSidebar();
}

// ─── SEND MESSAGE ───
async function sendMessage(text) {
  document.getElementById('emptyState')?.remove();
  const now = timeStr();
  appendBubble('user', text, now);
  setSending(true);
  const typingId = 'typing_' + Date.now();
  appendTyping(typingId);

 try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        session_id: currentSessionId || null,
        user_id: currentUser.id,
        // Jika 'Auto', kirim null atau string 'Auto' agar backend yang menentukan
        persona_name: currentPersona 
      })
    });

    const data = await res.json();
    removeTyping(typingId);
    if (!res.ok) throw new Error(data.error || 'Error dari server');

    if (data.session_id && !currentSessionId) {
      currentSessionId = data.session_id;
      sessions.unshift({ id: data.session_id, title: text.substring(0, 48) });
      renderSidebar();
      document.getElementById('topbarTitle').textContent = text.substring(0, 48);
    }

    const replyTime = timeStr();
    appendBubble('assistant', data.reply, replyTime);
  } catch (err) {
    removeTyping(typingId);
    appendBubble('assistant', '⚠️ ' + err.message, timeStr());
  } finally {
    setSending(false);
  }
}

async function handleSend() {
  const inp = document.getElementById('messageInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; 
  autoResize(inp);
  await sendMessage(text);
}

async function sendChip(el) {
  await sendMessage(el.textContent.trim());
}

// ─── PERSONA ───
function changePersona(val) {
  currentPersona = val;
  localStorage.setItem('aai_persona', val);
}

// ─── DOM HELPERS (yang tadinya hilang) ───
function appendBubble(role, content, time, animate = true) {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  if (!animate) row.style.animation = 'none';
  const initial = role === 'user' ? capitalize(currentUser.username || 'T')[0] : 'A';
  row.innerHTML = `
    <div class="avatar">${initial}</div>
    <div>
      <div class="bubble">${formatContent(content)}</div>
      <div class="bubble-time">${time}</div>
    </div>`;
  area.appendChild(row);
  scrollBottom();
}

function appendTyping(id) {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'msg-row assistant'; 
  row.id = id;
  row.innerHTML = `<div class="avatar">A</div>
    <div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  area.appendChild(row);
  scrollBottom();
}

function removeTyping(id) { 
  const el = document.getElementById(id); 
  if (el) el.remove(); 
}

function scrollBottom() { 
  const a = document.getElementById('chatArea'); 
  a.scrollTop = a.scrollHeight; 
}

function setSending(v) { 
  document.getElementById('sendBtn').disabled = v; 
  document.getElementById('messageInput').disabled = v; 
}

function formatContent(text) {
  return escHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code style="background:rgba(142,211,236,.25);padding:1px 5px;border-radius:5px;font-size:92%">$1</code>')
    .replace(/\n/g, '<br>');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeStr() { 
  return new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); 
}

function handleKey(e) { 
  if (e.key === 'Enter' && !e.shiftKey) { 
    e.preventDefault(); 
    handleSend(); 
  } 
}

function autoResize(el) { 
  el.style.height = 'auto'; 
  el.style.height = Math.min(el.scrollHeight, 140) + 'px'; 
}

// ─── INIT ───
loadSessions();
document.getElementById('personaSelect').value = currentPersona;   // remember pilihan persona
</script>
