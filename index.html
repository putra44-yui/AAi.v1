<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AAi</title>
<link rel="icon" type="image/gif" href="/ayaka.gif">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --blue-light:  #c8eaf5;
  --blue-mid:    #5ab4d4;
  --blue-dark:   #2a7a9e;
  --pink-soft:   #f9c4d8;
  --purple-soft: #d2b3e6;
  --white:       #ffffff;
  --off-white:   #f8fbff;
  --text:        #1e2a44;
  --text-muted:  #7a8aa8;
  --radius:      24px;
  --shadow-sm:   0 4px 12px rgba(138,234,245,.15);
  --shadow-md:   0 10px 30px rgba(138,234,245,.22);
}

* { box-sizing: border-box; margin:0; padding:0; }

html, body {
  max-width: 100%;
  overflow-x: hidden; /* Mencegah layar geser ke samping */
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--off-white);
  color: var(--text);
  height: 100dvh;
  display: flex;
  overflow: hidden; /* Mencegah geser atas bawah di luar area chat */
  position: relative;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(ellipse 80% 60% at 15% 25%, rgba(138,234,245,.18) 0%, transparent 60%),
              radial-gradient(ellipse 60% 70% at 85% 75%, rgba(210,179,230,.14) 0%, transparent 70%);
  pointer-events: none;
}

/* Batasi lebar bubble chat di Desktop agar tidak terlalu panjang */
.msg-row.assistant, .msg-row.user {
  max-width: 750px;
}

/* Tombol Aksi di Sidebar (Edit & Hapus) */
.session-actions { display: flex; gap: 8px; opacity: 0; transition: .2s; }
.session-item:hover .session-actions { opacity: 1; }
.action-btn { background: none; border: none; font-size: 16px; cursor: pointer; transition: transform .2s; }
.action-btn:hover { transform: scale(1.2); }

.logo { display:flex; align-items:center; gap:14px; text-decoration:none; }
.logo-icon {
  width: 100px; height: 100px; border-radius: 16px;
  background: transparent;

  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  animation: logoBreath 4s ease-in-out infinite;
}
.logo-name {
  font-family: 'Cormorant Garamond', serif; 
  font-size: 32px; font-weight: 700;
  background: linear-gradient(120deg, #5ab4d4, #d2b3e6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.new-chat-btn {
  width: 100%; padding: 14px 20px; margin-top: 20px;
  background: linear-gradient(135deg, var(--blue-mid), #b38fd4);
  color: white; border: none; border-radius: 20px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: var(--shadow-md);
  transition: all .3s ease;
}
.new-chat-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(90,180,212,.4); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; width: 100%; }
.topbar {
  padding: 18px 28px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(138,234,245,.25);
  display: flex; align-items: center; gap: 16px;
  z-index: 20;
}
.hamburger { display: none; font-size: 32px; cursor: pointer; color: var(--blue-dark); }

.chat-area {
  flex: 1; padding: 32px 32px 24px;
  display: flex; flex-direction: column; gap: 28px;
  background: var(--off-white);
  overflow-y: auto;
  overflow-x: hidden; /* Pastikan chat area tidak bikin scroll samping */
  scroll-behavior: smooth;
}

/* AVATAR & BUBBLE */
.msg-row.assistant { display: flex; align-items: flex-end; gap: 14px; max-width: 82%; }
.assistant .avatar {
  width: 48px; height: 48px; border-radius: 18px;
  background: transparent; 
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 18px rgba(138,234,245,.35);
  flex-shrink: 0;
  animation: stickerFloat 3.5s ease-in-out infinite;
  position: relative;
}
.assistant .avatar img { width: 100%; height: 100%; object-fit: contain; }

@keyframes stickerFloat { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-12px) rotate(8deg); } }

.msg-row.user { display: flex; justify-content: flex-end; max-width: 82%; margin-left: auto; }
.user .bubble {
  background: #ffffff; color: #1e2a44;
  padding: 16px 22px; border-radius: 24px; border-bottom-right-radius: 8px;
  border: 2px solid #c8eaf5; box-shadow: 0 6px 20px rgba(138,234,245,.18);
  font-size: 15.5px; line-height: 1.65;
}

.assistant .bubble {
  background: #c8eaf5; color: #1e2a44;
  padding: 16px 22px; border-radius: 24px; border-bottom-left-radius: 8px;
  box-shadow: 0 6px 20px rgba(138,234,245,.22);
  font-size: 15.5px; line-height: 1.65;
}

/* BROWSING BUTTON & STATUS */
#browsingBtn { padding: 8px; border-radius: 50%; font-size: 18px; border: none; cursor: pointer; transition: all .2s; background: transparent; color: #7a8aa8; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
#browsingBtn.on { background: linear-gradient(135deg, #5ab4d4, #2a7a9e); color: white; box-shadow: 0 4px 10px rgba(42,122,158,.3); }

#personaSelect { padding: 8px 10px; border-radius: 16px; background: #f8fbff; border: 1px solid #c8eaf5; font-size: 13px; font-weight: 500; outline: none; cursor: pointer; color: var(--text); height: 40px; max-width: 120px; }

.send-btn { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--blue-mid), #b38fd4); color: white; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer;}

/* THINKING ANIMATION */
.typing-indicator {
  display: flex; align-items: center; gap: 6px; padding: 12px 20px;
  background: #c8eaf5; border-radius: 9999px; width: fit-content; box-shadow: var(--shadow-sm);
}
.typing-dot { width: 8px; height: 8px; background: #2a7a9e; border-radius: 50%; animation: typingPulse 1.4s infinite ease-in-out; }
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }
@keyframes typingPulse { 0%, 100% { transform: scale(0.6); opacity: .4; } 50% { transform: scale(1); opacity: 1; } }

/* CODE & SOURCE */
.source-card, .code-card { background: #fff; border: 2px solid #c8eaf5; border-radius: 18px; padding: 14px 18px; margin-top: 10px; font-size: 14px; box-shadow: var(--shadow-sm); }
.code-card { background: #1e2a44; color: #c8eaf5; font-family: ui-monospace, monospace; position: relative; overflow-x: auto; }
.copy-btn { position: absolute; top: 12px; right: 12px; background: #5ab4d4; color: white; border: none; padding: 4px 12px; border-radius: 9999px; font-size: 12px; cursor: pointer; }

/* SESSION */
.session-item { padding: 14px 20px; margin: 4px 8px; border-radius: 18px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all .3s ease; }
.session-item:hover { background: rgba(138,234,245,.15); }
.session-item.active { background: rgba(138,234,245,.25); font-weight: 500; }
.session-item .delete-btn { opacity: 0; transition: .2s; font-size: 18px; color: #e74c3c; }
.session-item:hover .delete-btn { opacity: 1; }

/* INPUT */
.input-area { 
  padding: 12px 20px 20px; /* Padding dikurangi biar input lebih turun/rendah */
  background: rgba(255,255,255,.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(138,234,245,.25); 
}

/* ─── PEMBUNGKUS INPUT (KUNCI HORIZONTAL & RATA TENGAH) ─── */
.input-wrap { 
  display: flex; 
  flex-direction: row; /* WAJIB: Paksa berbaris ke samping */
  align-items: center; /* WAJIB: Rata tengah secara vertikal */
  justify-content: space-between;
  gap: 12px; 
  background: #ffffff; 
  border: 2px solid var(--blue-light); 
  padding: 8px 16px; 
  border-radius: 32px; /* Biar ujungnya membulat rapi */
  box-shadow: var(--shadow-md); 
  width: 100%; 
}

/* ─── TEXTAREA (AREA KETIK) ─── */
#messageInput { 
  flex: 1; /* WAJIB: Ambil semua sisa ruang di tengah */
  min-width: 0; /* WAJIB: Anti-jebol/mencegah dorong elemen lain */
  border: none; 
  background: transparent; 
  font-size: 15px; 
  outline: none; 
  resize: none; 
  max-height: 120px; 
  line-height: 1.5; 
  padding: 8px 0; 
}

/* ─── TOMBOL KIRI (BROWSING) ─── */
#browsingBtn { 
  flex-shrink: 0; /* Kunci ukuran, jangan menyusut */
  padding: 0; 
  border-radius: 50%; 
  font-size: 18px; 
  border: none; 
  cursor: pointer; 
  transition: all .2s; 
  background: transparent; 
  color: #7a8aa8; 
  width: 40px; 
  height: 40px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
}
#browsingBtn.on { background: linear-gradient(135deg, #5ab4d4, #2a7a9e); color: white; box-shadow: 0 4px 10px rgba(42,122,158,.3); }

/* ─── PILIHAN PERSONA (TENGAH-KANAN) ─── */
#personaSelect { 
  flex-shrink: 0; /* Kunci ukuran */
  padding: 8px 10px; 
  border-radius: 16px; 
  background: #f8fbff; 
  border: 1px solid #c8eaf5; 
  font-size: 13px; 
  font-weight: 500; 
  outline: none; 
  cursor: pointer; 
  color: var(--text); 
  height: 40px; 
  max-width: 140px; 
}

/* ─── TOMBOL KIRIM (KANAN) ─── */
.send-btn { 
  flex-shrink: 0; /* Kunci ukuran */
  width: 42px; 
  height: 42px; 
  border-radius: 50%; 
  background: linear-gradient(135deg, var(--blue-mid), #b38fd4); 
  color: white; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  border: none; 
  cursor: pointer; 
  box-shadow: 0 4px 12px rgba(90,180,212,.3);
  transition: transform .2s ease;
}
.send-btn:hover { transform: scale(1.1); }

/* ─── SIDEBAR UTAMA (BERLAKU UNTUK DESKTOP & DASAR) ─── */
.sidebar {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  width: 280px;
  background: var(--off-white);
  border-right: 1px solid rgba(138,234,245,.25);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
  flex-shrink: 0; /* WAJIB: Biar sidebar gak gepeng kegencet chat */
}

/* ─── SESSION LIST (SI PENDORONG CARD) ─── */
#sessionList {
  flex-grow: 1;
  overflow-y: auto;
  padding: 12px 8px;
}

/* ─── MEDIA QUERIES (KHUSUS HP) ─── */
@media (max-width: 768px) {
  body::before { display: none; }
  body { background: var(--off-white); }
  
  .hamburger { display: block; color: var(--blue-dark); z-index: 50; padding-right: 10px; }

  /* Overlay Sidebar Khusus HP (DISEMBUNYIKAN DI KIRI) */
  .sidebar {
    position: fixed;
    top: 0; left: 0;
    z-index: 9999;
    transform: translateX(-100%); /* WAJIB: Sembunyi ke kiri luar layar */
    box-shadow: none;
  }

  /* Saat Hamburger Diklik -> Terbuka */
  .sidebar.open { 
    transform: translateX(0); 
    box-shadow: 10px 0 30px rgba(0,0,0,0.3); 
  }

  /* Main area penyesuaian */
  .main { width: 100%; height: 100dvh; margin: 0; }
  .topbar { padding: 15px 20px; flex-wrap: wrap; }
  .chat-area { padding: 20px 16px; }
  .input-area { padding: 15px; }
  
  .msg-row.assistant, .msg-row.user { max-width: 90%; }
  .session-actions { opacity: 1; }
}

/* ─── USER CARD BAWAH ─── */
.user-card {
  flex-shrink: 0;         
  padding: 16px 20px;
  border-top: 1px solid rgba(138,234,245,.25);
  display: flex; 
  align-items: center; 
  justify-content: space-between;
  background: #ffffff;   
}
.user-info { display: flex; align-items: center; gap: 10px; }
.user-avatar-mini { width: 36px; height: 36px; border-radius: 50%; background: #c8eaf5; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.logout-btn { background: none; border: none; font-size: 20px; cursor: pointer; transition: transform .2s; color: #e74c3c; }
.logout-btn:hover { transform: scale(1.15); }

/* ─── DITAMBAHKAN: CSS Khusus untuk Markdown di dalam Bubble Chat ─── */
.bubble h1, .bubble h2, .bubble h3 { 
  margin-top: 12px; 
  margin-bottom: 8px; 
  font-size: 1.1em; 
  color: var(--blue-dark); 
}
.bubble p { margin-bottom: 8px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble ul, .bubble ol { margin-left: 20px; margin-bottom: 8px; }
.bubble pre { 
  background: #1e2a44; 
  color: #c8eaf5; 
  padding: 12px; 
  border-radius: 8px; 
  overflow-x: auto; 
  margin-top: 8px; 
  font-family: ui-monospace, monospace; 
  font-size: 13.5px;
}
.bubble code { 
  font-family: ui-monospace, monospace; 
  background: rgba(0,0,0,0.1); 
  padding: 2px 4px; 
  border-radius: 4px; 
  font-size: 13.5px;
}
.bubble pre code { background: transparent; padding: 0; }

</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a class="logo" href="/">
      <div class="logo-icon">
        <img src="/ayaka.webp" alt="AAi Logo" style="width:100%;height:100%;object-fit:contain;border-radius:16px;">
      </div>
      <span class="logo-name">AAi</span>
    </a>
    <button class="new-chat-btn" onclick="newChat()">
      <span style="font-size:18px;">✦</span> Obrolan Baru
    </button>
  </div>

  <div id="sessionList" style="flex:1;overflow-y:auto;padding:12px 8px;"></div>
  
  <div class="user-card">
    <div class="user-info">
      <div class="user-avatar-mini">👤</div>
      <div style="display:flex;flex-direction:column;">
        <span id="cardUsername" style="font-weight:600;font-size:14px;color:var(--text);">User</span>
        <span style="font-size:11px;color:var(--text-muted);">Keluarga</span>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()" title="Keluar dari AAi">
      <i class="fas fa-sign-out-alt"></i>
    </button>
  </div>
</aside>


<main class="main">
  
  <div class="topbar">
    <span class="hamburger" onclick="toggleSidebar()">☰</span>
    <span class="topbar-title" id="topbarTitle" style="font-size:22px;font-weight:600;">AAi — Keluarga Cerdas</span>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <div class="input-wrap">
      <button onclick="toggleBrowsing()" id="browsingBtn" title="Browsing Mode (Nyala/Mati)">🌐</button>

      <textarea id="messageInput" rows="1" placeholder="Ketik pesan…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>

      <select id="personaSelect" onchange="changePersona(this.value)" title="Pilih Gaya AI">
        <option value="Auto">✨ Auto</option>
        <option value="Santai">😌 Santai</option>
        <option value="Kritikus Brutal">🔥 Kritikus</option>
        <option value="Rosalia">🌹 Rosalia</option>
      </select>
      <button class="send-btn" onclick="handleSend()">▶</button>
    </div>
  </div>

</main>
<script>
// ─── STATE ───
const currentUser = JSON.parse(localStorage.getItem('aai_user') || '{}');
if (!currentUser.id) window.location.href = '/login';

let sessions = [];
let currentSessionId = null;
let currentPersona = localStorage.getItem('aai_persona') || 'Auto';
let isBrowsingMode = localStorage.getItem('aai_browsing_mode') !== 'false'; // default true

// ─── DEBUG HELPER ───
function logDebug(msg, color = '#2a7a9e') {
  console.log(`%c[AAi Debug] ${msg}`, `color:${color};font-weight:bold`);
}


// PASTIKAN FUNGSI INI HANYA SEPERTI INI SAJA (Hapus pemanggilan .innerHTML):
function toggleBrowsing() {
  isBrowsingMode = !isBrowsingMode;
  localStorage.setItem('aai_browsing_mode', isBrowsingMode); 
  
  const btn = document.getElementById('browsingBtn');

  if (isBrowsingMode) {
    btn.classList.add('on');
  } else {
    btn.classList.remove('on');
  }
  
  logDebug(`Browsing mode diubah → ${isBrowsingMode}`, '#e74c3c');
}
// ─── SEND MESSAGE (dengan debug super jelas) ───
async function sendMessage(text) {
  const area = document.getElementById('chatArea');
  if (!area.querySelector('.msg-row')) area.innerHTML = '';
  
  appendMessage('user', text);
  scrollBottom();

  const typingId = 'typing_' + Date.now();
  const browsingInfo = isBrowsingMode ? '🌐 mencari info terkini…' : '';
  area.insertAdjacentHTML('beforeend', `
    <div class="msg-row assistant" id="${typingId}">
      <div class="avatar" style="animation:stickerFloat 1.8s ease-in-out infinite; background:transparent;">
        <img src="/ayaka.gif" alt="Ayaka" style="width:100%;height:100%;object-fit:contain;">
      </div>
      <div class="typing-indicator">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
        <span style="margin-left:12px;font-size:13.5px;">AAi berpikir ${browsingInfo}</span>
      </div>
    </div>`);
  scrollBottom();

  logDebug(`Mengirim pesan → browsing_mode = ${isBrowsingMode} | persona = ${currentPersona}`);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        session_id: currentSessionId,
        user_id: currentUser.id,
        persona_name: currentPersona,
        browsing_mode: isBrowsingMode   // ← WAJIB true
      })
    });

    document.getElementById(typingId)?.remove();
    const data = await res.json();

    logDebug(`Backend balas → status ${res.status} | reply ada? ${!!data.reply}`, res.ok ? '#2a7a9e' : '#e74c3c');

    if (!res.ok) throw new Error(data.error || 'Server error');
    
    appendMessage('assistant', data.reply);
    if (data.session_id && !currentSessionId) {
      currentSessionId = data.session_id;
      loadSessions();
    }
  } catch (e) {
    document.getElementById(typingId)?.remove();
    appendMessage('assistant', `⚠️ ${e.message}`);
    logDebug(`ERROR: ${e.message}`, '#e74c3c');
  }
}

// ─── SESSIONS + DELETE ───
async function loadSessions() {
  const res = await fetch(`/api/sessions?user_id=${currentUser.id}`);
  if (res.ok) {
    sessions = await res.json();
    renderSidebar();
  }
}


// ─── RENAME SESSION ───
async function renameSession(id, oldTitle) {
  const newTitle = prompt("Masukkan judul baru untuk obrolan ini:", oldTitle);
  if (!newTitle || newTitle.trim() === "" || newTitle === oldTitle) return;

  // Optimistic UI update (ubah di layar dulu biar terasa instan)
  const sessionIndex = sessions.findIndex(s => s.id === id);
  if (sessionIndex !== -1) {
    sessions[sessionIndex].title = newTitle.trim();
    renderSidebar();
    if (currentSessionId === id) document.getElementById('topbarTitle').textContent = newTitle.trim();
  }

  try {
    const res = await fetch(`/api/sessions/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: newTitle.trim() })
    });
    if (!res.ok) throw new Error("Gagal update ke server");
  } catch (e) {
    console.error("Error rename:", e);
    // Kalau gagal, load ulang dari server
    loadSessions();
  }
}
function renderSidebar() {
  const container = document.getElementById('sessionList');
  container.innerHTML = '';

  if (!sessions.length) {
    container.innerHTML = `<p style="padding:24px;text-align:center;color:var(--text-muted);font-size:14px;">Belum ada obrolan.<br>Mulai yang baru di atas 👆</p>`;
    return;
  }

  sessions.forEach(s => {
    const item = document.createElement('div');
    item.className = `session-item ${s.id === currentSessionId ? 'active' : ''}`;
item.innerHTML = `
      <div style="flex:1;display:flex;align-items:center;gap:12px;overflow:hidden;">
        <div style="width:9px;height:9px;background:#5ab4d4;border-radius:50%;flex-shrink:0;"></div>
        <span style="flex:1;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(s.title || 'Obrolan')}</span>
      </div>
      <div class="session-actions">
        <button class="action-btn" title="Edit Judul" onclick="event.stopImmediatePropagation();renameSession('${s.id}', '${escHtml(s.title || '')}')">✏️</button>
        <button class="action-btn" title="Hapus Obrolan" onclick="event.stopImmediatePropagation();deleteSession('${s.id}')">🗑️</button>
      </div>
    `;
    item.onclick = (e) => { if (e.target.tagName !== 'BUTTON') loadSession(s.id); };
    container.appendChild(item);
  });
}

async function deleteSession(id) {
  if (!confirm('Hapus obrolan ini permanen?')) return;
  const res = await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
  if (res.ok) {
    if (currentSessionId === id) newChat();
    loadSessions();
  }
}

// ─── CHAT ───
async function loadSession(id) {
  currentSessionId = id;
  const session = sessions.find(s => s.id === id);
  document.getElementById('topbarTitle').textContent = session?.title || 'AAi';

  const res = await fetch(`/api/messages?session_id=${id}`);
  const messages = await res.json();

  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  messages.forEach(m => appendMessage(m.role, m.content, m.created_at));
  scrollBottom();
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
  renderSidebar();
}

function newChat() {
  currentSessionId = null;
  const area = document.getElementById('chatArea');
  area.innerHTML = `
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;text-align:center;padding:0 40px;">
      <div class="avatar" style="width:280px;height:280px;margin-bottom:24px;animation:stickerFloat 2.5s ease-in-out infinite; background:transparent;">
        <img src="/ayaka1.gif" alt="Ayaka" style="width:100%;height:100%;object-fit:contain;">
      </div>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:36px;color:var(--text);">Halo, ${currentUser.username}! 👋</h2>
      <p style="max-width:320px;color:var(--text-muted);font-size:16px;">AAi siap bantu kamu hari ini.<br><strong>Browsing Mode sudah AKTIF</strong> untuk info terkini 2026.</p>
    </div>`;
  document.getElementById('topbarTitle').textContent = 'AAi';
  renderSidebar();
}



function appendMessage(role, content, timestamp = null, isError = false) {
  const area = document.getElementById('chatArea');
  const time = timestamp 
    ? new Date(timestamp).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})
    : new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});

  let html = role === 'assistant' 
   // UBAH BAGIAN IMG SRC MENJADI INI:
    ? `<div class="msg-row assistant"><div class="avatar" style="background:transparent;"><img src="/ayaka.gif" alt="Ayaka" style="width:100%;height:100%;object-fit:contain;"></div><div style="flex:1"><div class="bubble">${formatContent(content)}</div><div style="font-size:11px;margin-top:6px;opacity:.65;">${time}</div></div></div>`
    : `<div class="msg-row user"><div style="flex:1;text-align:right"><div class="bubble">${escHtml(content)}</div><div style="font-size:11px;margin-top:6px;opacity:.65;">${time}</div></div></div>`;

  area.insertAdjacentHTML('beforeend', html);
  scrollBottom();
}

function formatContent(text) {
  // 1. Biarkan marked.js menerjemahkan **bold**, ## heading, dan ```code```
  let html = marked.parse(text);
  
  // 2. (Opsional) Tetap pertahankan custom card untuk "Sumber" agar tetap cantik
  html = html.replace(/Sumber:\s*(https?:\/\/[^\s<]+)/gi, `<div class="source-card">🌐 <a href="$1" target="_blank" style="color:#2a7a9e">$1</a></div>`);
  
  return html;
}

function copyCode(btn) {
  const code = btn.parentElement.textContent.replace('Copy','').trim();
  navigator.clipboard.writeText(code);
  const original = btn.textContent;
  btn.textContent = '✓';
  setTimeout(() => btn.textContent = original, 1800);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom() {
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}


// ─── LAINNYA ───

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px'; // Max tinggi dikurangi jadi 120px
}

function changePersona(val) {
  currentPersona = val;
  localStorage.setItem('aai_persona', val);
}

function handleSend() {
  const inp = document.getElementById('messageInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  autoResize(inp);
  sendMessage(text);
}

// ─── SIDEBAR TOGGLE (MOBILE) ───
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('open');
}

// Tutup sidebar otomatis jika user klik area chat (khusus tampilan HP)
document.addEventListener('click', function(e) {
  if (window.innerWidth <= 768) {
    const sidebar = document.getElementById('sidebar');
    const hamburger = document.querySelector('.hamburger');
    // Jika sidebar terbuka, dan yang diklik BUKAN sidebar & BUKAN hamburger
    if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !hamburger.contains(e.target)) {
      sidebar.classList.remove('open');
    }
  }
});



// ─── LOGOUT ───
function logout() {
  if (confirm("Yakin mau keluar, Bos?")) {
    localStorage.removeItem('aai_user');
    window.location.href = '/login'; // Pastikan rute '/login' kamu benar
  }
}


// ─── INIT ───
loadSessions();
document.getElementById('personaSelect').value = currentPersona;
newChat();

// Tambahkan blok ini untuk menyesuaikan warna tombol saat awal load
if (isBrowsingMode) {
  document.getElementById('browsingBtn').classList.add('on');
} else {
  document.getElementById('browsingBtn').classList.remove('on');
}

logDebug('Frontend siap • Browsing default = ' + isBrowsingMode);
</script>
